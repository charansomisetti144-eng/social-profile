<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">

  <title>Frontend Mentor | Social links profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&family=Young+Serif&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">

</head>

<body>
  <main>
    <article class="profile-card">
      <img src="images/avatar-jessica.jpeg" alt="Jessica Randall profile picture">
      <h1>Jessica Randall</h1>
      <p class="location">London, United Kingdom</p>
      <p class="bio">"Front-end developer and avid reader."</p>
      <ul class="social-links">
        <li class="social-link"><a href="#">GitHub</a></li>
        <li class="social-link"><a href="#">Frontend Mentor</a></li>
        <li class="social-link"><a href="#">LinkedIn</a></li>
        <li class="social-link"><a href="#">Twitter</a></li>
        <li class="social-link"><a href="#">Instagram</a></li>
      </ul>
    </article>
    <footer class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">SOMISETTI NAGA VEERA SRI CHARAN</a>.
    </footer>
  </main>

</body>

</html>
